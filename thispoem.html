<!DOCTYPE html>
<html>
    <head>
        <title>이런 시 - 이상</title>
        <style>
            @font-face {
                font-family: 'RoughlyWrittenJunwoo';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/RFjunwooo.woff2') format('woff2');
                font-weight: normal;
                font-display: swap;
            }
            @font-face {
                font-family: 'YoonChoWooSan';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408@1.0/YoonChildfundkoreaManSeh.woff2') format('woff2');
                font-weight: normal;
                font-display: swap;
            }

            body {
                margin: 0;
                padding: 0;
                background: white;
            }

            .box {
                max-width: 500px;
                margin: 40px auto; 
                border-radius: 2cm;
                text-align: center;
                background: linear-gradient(rgb(222, 168, 193), rgb(182, 93, 116));

                padding: 60px 20px;
                box-sizing: border-box;
            }

            .title {
                font-family : 'YoonChoWooSan', sans-serif;
                font-size: 50px;
                font-weight: bold;
                color: rgb(68, 9, 43);
                margin-bottom: 20px;
            }

            .RoughlyWrittenJunwoo { 
                font-family: 'RoughlyWrittenJunwoo', sans-serif; 
                font-size: 25px;
                line-height: 2;
                margin-bottom: 30px;
            }

            .author {
                font-family : 'YoonChoWooSan', sans-serif;
                font-size: 20px;
                color: rgb(60, 0, 49);
            }
        </style>
    </head>
    <body>
        <div class="box">
            <div class="title">이런 시</div>
            <div>
                <p class="RoughlyWrittenJunwoo">
                    내가 그다지 사랑하던 그대여 <br>
                    내 한평생 그대를 잊을 수 없소이다 <br>
                    내 차례에 못 올 사랑인줄은 알면서도 <br>
                    나 혼자는 꾸준히 생각하리라<br>
                    자 그러면 내내 어여쁘소서
                </p>
            </div>
            <div class="author">- 이상</div>
        </div>
    </body>
</html>
